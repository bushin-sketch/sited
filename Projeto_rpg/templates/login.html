<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Administrativo | Lumini Joias</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FDFBF7; /* O seu creme original */
        }
        .login-card {
            background: white;
            padding: 40px;
            border: 1px solid #C5A059;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }
        .login-card h2 { font-family: 'Playfair Display', serif; color: #A6823E; margin-bottom: 20px; }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Área do Dono</h2>
            <form method="POST">
                <input type="text" name="user" placeholder="Usuário" required>
                <input type="password" name="pass" placeholder="Senha" required>
                <button type="submit" class="btn-buy" style="width: 100%; margin-top: 10px; cursor: pointer;">Entrar</button>
            </form>
            <p style="margin-top: 20px;"><a href="/" style="color: #A6823E; text-decoration: none; font-size: 0.8rem;">← Voltar ao site</a></p>
        </div>
    </div>
</body>
</html>
