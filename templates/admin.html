{% extends 'base.html' %}
{% block content %}
<div class="admin-container">
    <h2 class="admin-title">NOVO DROP</h2>
    <form action="{{ url_for('admin') }}" method="POST" enctype="multipart/form-data" class="admin-form">
        
        <div class="form-section">
            <label>NOME DO PRODUTO</label>
            <input type="text" name="nome" required placeholder="Ex: MOLETOM COMPTON OVERSIZED">
        </div>

        <div class="form-row">
            <div class="form-section">
                <label>CATEGORIA</label>
                <select name="categoria" required>
                    <option value="Camisetas">CAMISETAS</option>
                    <option value="Moletons">MOLETONS</option>
                    <option value="Calças">CALÇAS</option>
                    <option value="Acessórios">ACESSÓRIOS</option>
                </select>
            </div>
            <div class="form-section">
                <label>PREÇO (R$)</label>
                <input type="number" step="0.01" name="preco" required placeholder="0.00">
            </div>
        </div>

        <div class="form-section">
            <label>DESCRIÇÃO</label>
            <textarea name="descricao" rows="3" placeholder="DETALHES DO PRODUTO..."></textarea>
        </div>

        <label class="inventory-label">GRADE DE ESTOQUE</label>
        <div class="inventory-grid">
            <div class="stock-item"><span>P</span><input type="number" name="p" value="0"></div>
            <div class="stock-item"><span>M</span><input type="number" name="m" value="0"></div>
            <div class="stock-item"><span>G</span><input type="number" name="g" value="0"></div>
            <div class="stock-item"><span>GG</span><input type="number" name="gg" value="0"></div>
        </div>

        <div class="form-section upload-box">
            <label>IMAGEM DO PRODUTO</label>
            <input type="file" name="imagem" accept="image/*" required>
        </div>

        <button type="submit" class="btn-save">PUBLICAR PRODUTO</button>
    </form>
</div>
{% endblock %}
