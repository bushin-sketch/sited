<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Escudo do Mestre</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
        }
        .login-card {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            text-align: center;
            width: 300px;
        }
        .login-card input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2 style="color: #ffd700;">⚔️ Acesso ⚔️</h2>
            <form method="POST">
                <input type="text" name="username" placeholder="Usuário" required>
                <input type="password" name="password" placeholder="Senha" required>
                <button type="submit" class="btn-primary" style="width: 100%;">Entrar</button>
            </form>
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <p style="color: #ff4d4d; font-size: 0.8em; margin-top: 10px;">{{ messages[0] }}</p>
              {% endif %}
            {% endwith %}
        </div>
    </div>
</body>
</html>
